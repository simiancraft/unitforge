[test]
# The subpathExports test suite imports from dist/ to prove published subpath
# resolution works. Exclude dist/ from coverage so reports show src/ accuracy.
coveragePathIgnorePatterns = ["**/dist/**", "dist/**", "**/dist/*"]
coverageSkipTestFiles = true
# Note: bun's `coverageThreshold` setting is silently inert in 1.3.x (verified
# empirically: setting it to 0.99 against 97.7% actual coverage exits 0). We
# rely on Codecov reports + CI status (codecov.yml) to flag regressions until
# Bun honors the threshold or we ship a CI-side parser.
