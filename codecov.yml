# Codecov configuration. Source of truth for the PR status checks
# `codecov/project` and `codecov/patch`, and the README coverage badge.
#
# Current src/ coverage: 100% functions, ~99.92% lines. The lone uncovered
# line is a defensive throw at forge.ts that is provably unreachable from
# the public API (the impl-signature already guards `!safeConfig?.via`)
# but kept as a TS-narrowing belt-and-suspenders. Project target is set
# to 99.5% to match observed reality; patch target stays at 100% so any
# new code added in a PR is expected to be fully covered. Policy is
# "no measurable regression from current state."

codecov:
  # Wait for the GH Actions upload before posting status checks.
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  # Report-level precision. 2 decimal places so small drifts are visible.
  precision: 2
  round: down
  range: '95...100'
  status:
    project:
      default:
        target: 99.5%
        threshold: 0.5% # Floor of 99% absorbs the one defensive throw.
        if_ci_failed: error
    patch:
      default:
        target: 100%
        threshold: 0.5%

# Ignore dist/; it's build output, tested only via the subpath-exports
# smoke tests (which exist to prove package.json exports resolve, not to
# re-measure src/ logic).
ignore:
  - 'dist/**/*'
  - 'demo/**/*'
  - 'scripts/**/*'
  - 'test/**/*'
  - '*.config.*'

comment:
  layout: 'reach, diff, flags, files'
  behavior: default
  require_changes: false
