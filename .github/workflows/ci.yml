name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for the whole workflow; the `release` job
# overrides with a broader block for semantic-release to push tags.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.1
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run lint

      # Build before typecheck and test:
      #   - test/demo-invariants.test.ts imports from `../demo/src/...`;
      #     tsgo follows the import and pulls those demo files in, which
      #     in turn require `unitforge` (the root package) to resolve via
      #     dist/. Without dist/ first, typecheck reports demo errors.
      #   - test/subpathExports.test.ts verifies the package.json `exports`
      #     map against actual emitted dist/ files at runtime.
      - name: Build
        run: bun run build

      # Demo install populates demo/node_modules so that demo files
      # imported transitively from test/demo-invariants.test.ts can
      # resolve `unitforge` via Node's module resolution. Skipped on
      # `--no-frozen-lockfile` to match deploy-demo.yml (demo has no
      # checked-in lockfile).
      - name: Install (demo)
        working-directory: ./demo
        run: bun install --no-frozen-lockfile

      - name: Typecheck (tsgo)
        run: bun run typecheck

      - name: Package hygiene (publint + attw)
        run: bun run check:package

      - name: Dead code (knip)
        run: bun run check:knip

      - name: Test with coverage
        run: bun test --coverage --coverage-reporter=lcov

      # Gate on non-fork to prevent CODECOV_TOKEN exfil from untrusted PRs.
      # pull_request from a fork has head.repo.full_name != the receiving repo.
      - name: Upload coverage reports to Codecov
        if: >
          github.event_name == 'push' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      # Stryker mutation testing. Adds ~30-60s of wall time to the
      # check job; gated on the break threshold in stryker.config.json
      # (currently 75; baseline is 80.43). Runs after coverage so a
      # mutation regression doesn't suppress the coverage upload.
      - name: Mutation testing (Stryker)
        run: bun run mutation

  release:
    name: Release
    needs: check
    # Gated on the RELEASE_ENABLED repo variable. Stays dormant until the
    # APP_ID + APP_PRIVATE_KEY secrets are configured (GitHub App that
    # bypasses main's ruleset for the chore(release) commit + tag).
    # Flip `gh variable set RELEASE_ENABLED --body true` to activate.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # Mint a short-lived App token so @semantic-release/git can push the
      # chore(release) commit + tag back to main. The App is in main's
      # ruleset bypass list; the default GITHUB_TOKEN is not.
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.1
        with:
          bun-version: '1.3.13'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Sigstore attestation for the published tarball. id-token: write
          # is already set in the job permissions.
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release
