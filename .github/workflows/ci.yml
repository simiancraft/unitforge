name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for the whole workflow; the `release` job
# overrides with a broader block for semantic-release to push tags.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.1
        with:
          bun-version: '1.1.34'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run lint

      - name: Typecheck (tsgo)
        run: bun run typecheck

      # Build before test so test/subpathExports.test.ts can verify the
      # package.json 'exports' map against actual emitted dist/ files.
      - name: Build
        run: bun run build

      - name: Package hygiene (publint + attw)
        run: bun run check:package

      - name: Dead code (knip)
        run: bun run check:knip

      - name: Test with coverage
        run: bun test --coverage --coverage-reporter=lcov

      # Gate on non-fork to prevent CODECOV_TOKEN exfil from untrusted PRs.
      # pull_request from a fork has head.repo.full_name != the receiving repo.
      - name: Upload coverage reports to Codecov
        if: >
          github.event_name == 'push' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5.5.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  release:
    name: Release
    needs: check
    # Gated on the RELEASE_ENABLED repo variable. Stays dormant until the
    # APP_ID + APP_PRIVATE_KEY secrets are configured (GitHub App that
    # bypasses main's ruleset for the chore(release) commit + tag).
    # Flip `gh variable set RELEASE_ENABLED --body true` to activate.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # Mint a short-lived App token so @semantic-release/git can push the
      # chore(release) commit + tag back to main. The App is in main's
      # ruleset bypass list; the default GITHUB_TOKEN is not.
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.1
        with:
          bun-version: '1.1.34'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx semantic-release
