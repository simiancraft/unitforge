name: link check

# Scheduled-only: catches link rot in README / NOTICE / SECURITY without
# blocking PRs on transient upstream flakes. Failed runs send a GitHub
# notification to the repo owner.

on:
  schedule:
    - cron: '0 12 1 * *' # 1st of the month, 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Check markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # Skip GitHub's per-IP rate-limited API endpoints (shields.io
          # badges, codecov.io graphs) and any localhost dev refs; those
          # return flaky 429s under a cold cache on CI runners.
          args: >-
            --verbose
            --no-progress
            --max-retries 2
            --exclude-mail
            --exclude '^https?://(img\.shields\.io|codecov\.io)'
            './**/*.md'
          fail: true
