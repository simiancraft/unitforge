name: Bug report
description: Something in unitforge doesn't behave as documented.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. A reproducible example is by far the most useful thing you can include.

        **Do not use this form for security issues.** See [SECURITY.md](https://github.com/simiancraft/unitforge/blob/main/SECURITY.md).

  - type: input
    id: version
    attributes:
      label: unitforge version
      description: Output of `npm ls unitforge` or the value from your lockfile.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime
      description: Node, Bun, Deno, or browser; and version.
      placeholder: "Bun 1.3.13 / Node 22.4.0 / Chrome 128"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Smallest possible code snippet that triggers the bug. Inline is fine; a link to a gist or StackBlitz is better.
      render: ts
      placeholder: |
        import { convert } from 'unitforge';
        import { meter, foot } from 'unitforge/kits/si';
        console.log(convert(5, meter, foot));
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include error messages and stack traces verbatim.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else; screenshots, adjacent attempts, suspected cause.
    validations:
      required: false
